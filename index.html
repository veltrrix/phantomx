    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            min-height: 100dvh;
            background: #0A0510;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #F0EBF5;
            overflow-x: hidden;
            position: relative;
        }
        /* ---- Background grid & orbs ---- */
        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: linear-gradient(rgba(232,184,84,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(232,184,84,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }
        @keyframes gridMove { 100% { transform: translate(60px,60px); } }
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
            animation: float 16s ease-in-out infinite alternate;
        }
        .orb1 { width: 500px; height: 500px; background: #E63946; top: -15%; right: -10%; opacity: 0.12; }
        .orb2 { width: 400px; height: 400px; background: #D62828; bottom: -10%; left: -10%; opacity: 0.10; animation-duration: 20s; }
        .orb3 { width: 300px; height: 300px; background: #7A48AA; top: 50%; left: 50%; transform: translate(-50%,-50%); opacity: 0.06; animation-duration: 24s; }
        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            50% { transform: translate(30px,-40px) scale(1.1); }
            100% { transform: translate(-20px,30px) scale(0.9); }
        }

        /* ---- Card ---- */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 32px 28px 28px;
            background: rgba(10,5,16,0.7);
            backdrop-filter: blur(30px) saturate(1.4);
            -webkit-backdrop-filter: blur(30px) saturate(1.4);
            border-radius: 40px;
            border: 1px solid rgba(232,184,84,0.12);
            box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 80px rgba(232,184,84,0.04);
            text-align: center;
            opacity: 0;
            transform: translateY(30px) scale(0.96);
            animation: rise 1s cubic-bezier(0.23,1,0.32,1) 0.1s forwards;
        }
        @keyframes rise { to { opacity:1; transform:translateY(0) scale(1); } }

        /* ---- Top badge: India No.1 ---- */
        .top-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(230,57,70,0.12);
            border: 1px solid rgba(230,57,70,0.25);
            padding: 6px 16px 6px 12px;
            border-radius: 60px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #FF6B6B;
            text-transform: uppercase;
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 16px;
            backdrop-filter: blur(4px);
        }
        .top-badge span { font-size: 16px; line-height: 1; }

        /* ---- Avatar ---- */
        .avatar-section {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 18px;
        }
        .avatar-ring {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 2px solid rgba(230,57,70,0.3);
            animation: spinRing 8s linear infinite;
            pointer-events: none;
        }
        .avatar-ring::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            border-top-color: #E63946;
            border-right-color: #D62828;
            animation: spinRing 4s linear infinite reverse;
        }
        @keyframes spinRing { 100% { transform: rotate(360deg); } }
        .avatar-glow {
            position: absolute;
            inset: -20px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(230,57,70,0.2), transparent 70%);
            filter: blur(20px);
            animation: pulseGlow 3s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%,100% { opacity:0.4; transform:scale(1); }
            50% { opacity:0.8; transform:scale(1.1); }
        }
        .avatar-frame {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #E63946, #D62828);
            box-shadow: 0 0 50px rgba(230,57,70,0.15);
        }
        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            background: #0A0510;
            border: 3px solid #0A0510;
            transition: transform 0.4s ease;
        }
        .avatar:hover { transform: scale(1.04); }
        .avatar-fallback {
            width:100%; height:100%;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:52px;
            font-weight:800;
            color:#E63946;
            background:#1a0e24;
            border:3px solid #0A0510;
        }

        /* ---- Typography ---- */
        .badge {
            display: inline-block;
            padding: 4px 16px 4px 12px;
            border-radius: 100px;
            background: rgba(230,57,70,0.08);
            border: 1px solid rgba(230,57,70,0.12);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #FF6B6B;
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 10px;
        }
        .badge .dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #E63946;
            margin-right: 6px;
            animation: blink 1.4s ease-in-out infinite;
        }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
        .name {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: clamp(32px, 9vw, 46px);
            line-height: 1.1;
            background: linear-gradient(135deg, #fff 30%, #FF6B6B 70%, #E63946);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .tagline {
            color: #B0A0B8;
            font-size: 15px;
            font-weight: 400;
            max-width: 300px;
            margin: 0 auto 24px;
            line-height: 1.5;
        }

        /* ---- CTA Button (RED) ---- */
        .cta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 24px;
            border-radius: 60px;
            background: linear-gradient(135deg, #E63946, #B71C1C);
            color: #fff;
            font-weight: 800;
            font-size: 16px;
            text-decoration: none;
            box-shadow: 0 8px 40px rgba(230,57,70,0.4);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .cta::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .cta:hover::after { opacity: 1; }
        .cta:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 50px rgba(230,57,70,0.6);
        }
        .cta:active { transform: scale(0.97); }
        .cta svg { flex-shrink: 0; }
        .cta .arrow { transition: transform 0.3s; }
        .cta:hover .arrow { transform: translateX(6px); }

        /* ---- Telegram icon inside button (red themed) ---- */
        .cta .tg-icon circle { fill: #fff; }
        .cta .tg-icon path { fill: #E63946; }  /* red telegram icon */

        /* ---- Trust list ---- */
        .trust {
            list-style: none;
            margin: 20px 0 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .trust li {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 500;
            color: #B0A0B8;
            transition: color 0.3s, transform 0.2s;
            padding: 4px 0;
        }
        .trust li:hover { color: #F0EBF5; transform: translateX(4px); }
        .trust svg { width: 16px; height: 16px; flex-shrink: 0; }
        .trust svg circle { fill: rgba(230,57,70,0.15); }
        .trust svg path { stroke: #E63946; }

        /* ---- Divider & footer ---- */
        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(230,57,70,0.2), transparent);
            margin: 20px auto 12px;
        }
        .footer {
            font-size: 11px;
            color: rgba(176,160,184,0.3);
            letter-spacing: 0.02em;
            transition: color 0.3s;
        }
        .footer:hover { color: rgba(176,160,184,0.6); }

        /* ---- Responsive ---- */
        @media (max-width: 440px) {
            .card { padding: 24px 16px 20px; border-radius: 28px; }
            .avatar-section { width: 120px; height: 120px; }
            .avatar-frame { width: 120px; height: 120px; }
            .top-badge { font-size: 10px; padding: 4px 12px; }
        }
        @media (max-width: 360px) {
            .avatar-section { width: 100px; height: 100px; }
            .avatar-frame { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <main class="card">
        <!-- Top badge: India No.1 Trading Channel -->
        <div class="top-badge">

        <!-- Avatar -->
        <div class="avatar-section">

                <img class="avatar" id="avatarImg" src="anuragarmy.jpg" alt="Ashish Bhai" loading="eager" />

            </svg>
            <span id="ctaText">𝑱𝒐𝒊𝒏 𝒕𝒉𝒆 𝑪𝒉𝒂𝒏𝒏𝒆𝒍</span>
            <svg class="arrow" width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M5 12h13M13 6l6 6-6 6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>

        <!-- Trust List -->
        <ul class="trust" id="trustList">
            <li>
                <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" /><path d="M7 12.5l3 3 7-7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                Best Channel on Telegram
            </li>
            <li>
                <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" /><path d="M7 12.5l3 3 7-7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>

            </li>
            <li>
                <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" /><path d="M7 12.5l3 3 7-7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>

            </li>
        </ul>

    </main>

    <!-- Audio (autoplay, loop, no visible controls) -->
    <audio id="voiceAudio" preload="auto" playsinline autoplay loop>
        <source src="ashish.ogg" type="audio/ogg" />
        <source src="ashish.mp3" type="audio/mpeg" />
    </audio>

    <script>
        // ─── CONFIG ────────────────────────────────────────────────────────────
        const CONFIG = {
            channelName: "𝑨𝒏𝒖𝒓𝒂𝒈 𝑨𝒓𝒎𝒚",
            tagline: "A short line about what people get when they join.",
            ctaText: "𝑱𝒐𝒊𝒏 𝒕𝒉𝒆 𝑪𝒉𝒂𝒏𝒏𝒆𝒍",
            ctaHref: "https://t.me/+U-KGNdggmYA1ZDZl",
            trustPoints: ["Best Channel on Telegram", "100% Safe & Secure", "Trusted by Thousands"]
        };

        // Populate content
        document.getElementById('channelName').textContent = CONFIG.channelName;
        document.getElementById('tagline').textContent = CONFIG.tagline;
        document.getElementById('ctaText').textContent = CONFIG.ctaText;
        document.getElementById('ctaBtn').href = CONFIG.ctaHref;
        document.getElementById('footer').innerHTML = `&copy; ${new Date().getFullYear()} ${CONFIG.channelName}. All rights reserved.`;

        const trustList = document.getElementById('trustList');
        trustList.innerHTML = CONFIG.trustPoints.map(p => `
            <li>
                <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" /><path d="M7 12.5l3 3 7-7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                ${p}
            </li>
        `).join('');

        // Avatar fallback
        document.getElementById('avatarImg').addEventListener('error', function() {
            const wrap = this.parentElement;
            const initial = (CONFIG.channelName.trim()[0] || '•').toUpperCase();
            wrap.innerHTML = `<div class="avatar-fallback">${initial}</div>`;
        }, { once: true });

        // ─── Autoplay audio ──────────────────────────────────────────────────
        const audio = document.getElementById('voiceAudio');
        let audioCtx;

        async function ensureAudio() {
            if (!audioCtx) {
                const Ctx = window.AudioContext || window.webkitAudioContext;
                audioCtx = new Ctx();
                const source = audioCtx.createMediaElementSource(audio);
                source.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        async function autoplay() {
            try {
                await ensureAudio();
                await audio.play();
            } catch (_) {
                // retry on user interaction
                const retry = async () => {
                    try {
                        await ensureAudio();
                        await audio.play();
                        cleanup();
                    } catch (_) {}
                };
                const cleanup = () => {
                    ['pointerdown','touchstart','scroll','keydown'].forEach(ev => document.removeEventListener(ev, retry));
                };
                ['pointerdown','touchstart','scroll','keydown'].forEach(ev => document.addEventListener(ev, retry, { once: true, passive: true }));
            }
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', autoplay);
        else autoplay();

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && audio.paused) autoplay();
        });
    </script>
